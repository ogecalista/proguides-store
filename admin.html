<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — ProGuides Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:    #1B3A4B;
      --lime:    #A8D832;
      --lav:     #C4B5F4;
      --bg:      #F4F6F3;
      --white:   #FFFFFF;
      --muted:   #6B7A74;
      --border:  #DDE3DD;
      --danger:  #E05252;
      --success: #2DB87A;
      --warning: #F5A623;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--teal); min-height: 100vh; }

    /* LOADING SCREEN */
    #loadingScreen { position: fixed; inset: 0; background: var(--teal); display: flex; align-items: center; justify-content: center; z-index: 999; }
    #loadingScreen .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--lime); }
    #loadingScreen .logo span { color: #fff; font-weight: 400; }
    #mainContent { display: none; }

    /* NAV */
    nav { background: var(--teal); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--lime); text-decoration: none; }
    .nav-logo span { color: var(--white); font-weight: 400; }
    .nav-badge { background: var(--danger); color: white; font-size: 0.75rem; font-weight: 700; padding: .2rem .6rem; border-radius: 20px; margin-left: .5rem; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-right span { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
    #adminLogout { background: transparent; border: 1px solid rgba(168,216,50,0.4); color: var(--lime); padding: .35rem .9rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; transition: all .2s; }
    #adminLogout:hover { background: var(--lime); color: var(--teal); }

    /* LAYOUT */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* TABS */
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.75rem; background: var(--white); padding: .4rem; border-radius: 12px; border: 1px solid var(--border); width: fit-content; }
    .tab { padding: .55rem 1.25rem; border-radius: 8px; border: none; background: transparent; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; color: var(--muted); cursor: pointer; transition: all .2s; }
    .tab.active { background: var(--teal); color: var(--white); }
    .tab:hover:not(.active) { color: var(--teal); }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
    .stat-card { background: var(--white); border-radius: 14px; padding: 1.25rem 1.5rem; border: 1px solid var(--border); }
    .stat-icon { font-size: 1.3rem; margin-bottom: .5rem; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: .2rem; }

    /* CARD */
    .card { background: var(--white); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 1.5rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 2px solid var(--bg); }
    .card-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lime); display: inline-block; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; padding: .6rem .75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 2px solid var(--bg); white-space: nowrap; }
    td { padding: .85rem .75rem; border-bottom: 1px solid var(--bg); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(244,246,243,0.6); }

    /* BADGES */
    .badge { padding: .2rem .65rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
    .badge.pending  { background: rgba(245,166,35,0.15); color: #a06b00; }
    .badge.approved { background: rgba(45,184,122,0.15); color: #1a7a52; }
    .badge.rejected { background: rgba(224,82,82,0.15);  color: #9b2828; }

    /* ACTION BUTTONS */
    .btn-approve { background: rgba(45,184,122,0.1); color: #1a7a52; border: 1px solid rgba(45,184,122,0.3); padding: .3rem .75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all .2s; margin-right: .4rem; }
    .btn-approve:hover { background: var(--success); color: white; }
    .btn-reject { background: rgba(224,82,82,0.1); color: #9b2828; border: 1px solid rgba(224,82,82,0.3); padding: .3rem .75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-reject:hover { background: var(--danger); color: white; }

    /* PRODUCT IMAGE */
    .product-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--bg); border: 1px solid var(--border); }
    .no-img { width: 48px; height: 48px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

    /* EMPTY */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; display: block; }

    /* TOAST */
    #toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--teal); color: white; padding: .85rem 1.5rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; display: none; z-index: 999; animation: slideUp .3s ease; }
    #toast.show { display: block; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } table { font-size: 0.8rem; } td, th { padding: .6rem .5rem; } }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div class="logo">ProGuides<span> Store</span></div>
</div>

<!-- MAIN ADMIN UI -->
<div id="mainContent">
  <nav>
    <div style="display:flex;align-items:center;gap:.5rem;">
      <a class="nav-logo" href="index.html">ProGuides<span> Store</span></a>
      <span class="nav-badge">ADMIN</span>
    </div>
    <div class="nav-right">
      <span>Admin Panel</span>
      <button id="adminLogout">Logout</button>
    </div>
  </nav>

  <div class="page-wrap">
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🏪</div>
        <div class="stat-value" id="statVendors">—</div>
        <div class="stat-label">Total Vendors</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-value" id="statPendingVendors">—</div>
        <div class="stat-label">Pending Vendors</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🛍️</div>
        <div class="stat-value" id="statProducts">—</div>
        <div class="stat-label">Total Products</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔍</div>
        <div class="stat-value" id="statPendingProducts">—</div>
        <div class="stat-label">Pending Products</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('vendors', this)">🏪 Vendors</button>
      <button class="tab" onclick="switchTab('products', this)">🛍️ Products</button>
    </div>

    <!-- VENDORS TAB -->
    <div class="tab-content active" id="tab-vendors">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="dot"></span> All Vendors</div>
        </div>
        <div id="vendorsTable">
          <div class="empty"><span class="empty-icon">⏳</span><p>Loading vendors…</p></div>
        </div>
      </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab-content" id="tab-products">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="dot"></span> All Products</div>
        </div>
        <div id="productsTable">
          <div class="empty"><span class="empty-icon">⏳</span><p>Loading products…</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://jomsflisyeohejfrvxnf.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvbXNmbGlzeWVvaGVqZnJ2eG5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTY5MTIsImV4cCI6MjA5NjE5MjkxMn0.qaC_PbEIfHJq4ae9gRJxcUV-fgwrXTMEldO6yj66KNY';
  const ADMIN_EMAIL   = 'proguidesstore@gmail.com';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── AUTH CHECK ─────────────────────────────────────────
  async function checkAuth() {
    const { data: { session } } = await db.auth.getSession();

    if (!session) {
      window.location.href = 'admin-login.html';
      return;
    }

    if (session.user.email !== ADMIN_EMAIL) {
      await db.auth.signOut();
      window.location.href = 'admin-login.html';
      return;
    }

    // Show admin panel
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    loadAll();
  }

  // ── LOGOUT ─────────────────────────────────────────────
  document.getElementById('adminLogout').addEventListener('click', async () => {
    await db.auth.signOut();
    window.location.href = 'admin-login.html';
  });

  // ── TABS ───────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
    btn.classList.add('active');
  }

  // ── TOAST ──────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show';
    setTimeout(() => { t.className = ''; }, 3000);
  }

  // ── LOAD ALL ───────────────────────────────────────────
  async function loadAll() {
    await Promise.all([loadVendors(), loadProducts()]);
  }

  // ── VENDORS ────────────────────────────────────────────
  async function loadVendors() {
    const { data, error } = await db
      .from('vendors')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { console.error(error); return; }

    const total   = data.length;
    const pending = data.filter(v => v.status === 'pending').length;
    document.getElementById('statVendors').textContent        = total;
    document.getElementById('statPendingVendors').textContent = pending;

    if (!data.length) {
      document.getElementById('vendorsTable').innerHTML = `
        <div class="empty"><span class="empty-icon">🏪</span><p>No vendors yet.</p></div>`;
      return;
    }

    const rows = data.map(v => `
      <tr>
        <td><strong>${v.full_name || '—'}</strong><br/><span style="color:var(--muted);font-size:0.8rem;">${v.email}</span></td>
        <td>${v.store_name || '—'}</td>
        <td>${v.category || '—'}</td>
        <td>${v.phone || '—'}</td>
        <td><span class="badge ${v.status || 'pending'}">${v.status || 'pending'}</span></td>
        <td>
          ${v.status !== 'approved' ? `<button class="btn-approve" onclick="updateVendor('${v.id}','approved')">✓ Approve</button>` : ''}
          ${v.status !== 'rejected' ? `<button class="btn-reject" onclick="updateVendor('${v.id}','rejected')">✕ Reject</button>` : ''}
        </td>
      </tr>`).join('');

    document.getElementById('vendorsTable').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Vendor</th>
            <th>Store Name</th>
            <th>Category</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function updateVendor(id, status) {
    const isApproved = status === 'approved';
    const { error } = await db
      .from('vendors')
      .update({ status, is_approved: isApproved, is_active: isApproved })
      .eq('id', id);

    if (error) { showToast('❌ Error updating vendor'); console.error(error); return; }
    showToast(`✅ Vendor ${status} successfully`);
    loadVendors();
  }

  // ── PRODUCTS ───────────────────────────────────────────
  async function loadProducts() {
    const { data, error } = await db
      .from('products')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { console.error(error); return; }

    const total   = data.length;
    const pending = data.filter(p => p.status === 'pending').length;
    document.getElementById('statProducts').textContent        = total;
    document.getElementById('statPendingProducts').textContent = pending;

    if (!data.length) {
      document.getElementById('productsTable').innerHTML = `
        <div class="empty"><span class="empty-icon">🛍️</span><p>No products yet.</p></div>`;
      return;
    }

    const rows = data.map(p => {
      const img = p.images && p.images.length > 0
        ? `<img class="product-thumb" src="${p.images[0]}" alt="${p.name}"/>`
        : `<div class="no-img">🛍️</div>`;
      return `
        <tr>
          <td>${img}</td>
          <td><strong>${p.name || '—'}</strong></td>
          <td>${p.category || '—'}</td>
          <td>₦${Number(p.price || 0).toLocaleString()}</td>
          <td>${p.delivery_type || '—'}</td>
          <td><span class="badge ${p.status || 'pending'}">${p.status || 'pending'}</span></td>
          <td>
            ${p.status !== 'approved' ? `<button class="btn-approve" onclick="updateProduct('${p.id}','approved')">✓ Approve</button>` : ''}
            ${p.status !== 'rejected' ? `<button class="btn-reject" onclick="updateProduct('${p.id}','rejected')">✕ Reject</button>` : ''}
          </td>
        </tr>`;
    }).join('');

    document.getElementById('productsTable').innerHTML = `
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Delivery</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function updateProduct(id, status) {
    const { error } = await db
      .from('products')
      .update({ status })
      .eq('id', id);

    if (error) { showToast('❌ Error updating product'); console.error(error); return; }
    showToast(`✅ Product ${status} successfully`);
    loadProducts();
  }

  // ── INIT ───────────────────────────────────────────────
  checkAuth();
</script>
</body>
</html>
